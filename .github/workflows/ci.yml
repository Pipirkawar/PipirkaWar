name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'AGENT_HANDOFF.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'AGENT_HANDOFF.md'
  schedule:
    # Ежедневный security-аудит зависимостей в 04:00 UTC.
    # Дополняет on-demand pip-audit-trigger на изменения pyproject.toml.
    - cron: '0 4 * * *'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: lint + types + tests (py${{ matrix.python-version }})
    # Skipped on schedule-trigger (audit-only).
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy --strict
        run: mypy

      - name: Import-linter (layered architecture contract)
        run: lint-imports

      - name: Pytest + coverage (≥ 80 %)
        run: pytest

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  audit:
    name: pip-audit (security)
    # pip-audit гоняется только когда:
    #   - schedule (ежедневный CVE-rescan на актуальном main);
    #   - push в main (после мерджа PR-а);
    #   - PR, который меняет pyproject.toml (новый/обновлённый dep).
    # Pull_request-runs без изменений зависимостей пропускают этот job —
    # это безопасно, т.к. набор зависимостей такой же как на main.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect pyproject changes (PR only)
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            pyproject:
              - 'pyproject.toml'

      - name: Skip on PR without pyproject changes
        id: should_run
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ steps.changes.outputs.pyproject }}" != "true" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping pip-audit: pyproject.toml unchanged in this PR."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install pip-audit
        if: steps.should_run.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pip-audit (fail on known CVEs)
        if: steps.should_run.outputs.run == 'true'
        run: pip-audit --skip-editable
