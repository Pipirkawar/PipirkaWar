# Pre-commit hooks. Активируются командой `pre-commit install`.
# То же самое запускается на CI (см. .github/workflows/ci.yml) — локально
# и в CI должно всегда совпадать.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ruff-pre-commit `rev` должен совпадать с версией `ruff`, которую
  # ставит CI через pyproject (ruff>=0.5,<1). Иначе CI и локальный
  # pre-commit будут спорить о форматировании.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.12
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - "aiogram>=3.13,<4"
          - "pydantic>=2.7,<3"
          - "pydantic-settings>=2.4,<3"
          - "structlog>=24.1,<26"
          - "types-PyYAML>=6.0,<7"
          - "SQLAlchemy[asyncio]>=2.0.30,<3"
          - "alembic>=1.13,<2"
          - "APScheduler>=3.10,<4"
          - "httpx>=0.27,<1"
          - "pynacl>=1.5,<2"
        args: ["--config-file=pyproject.toml"]
        # tests are checked separately via pytest+mypy in CI
        exclude: ^tests/

  # import-linter гоняем как «local»-хук поверх проектного venv: оно
  # должно уметь импортировать пакет `pipirik_wars` (а pre-commit
  # создаёт изолированный venv без `pip install -e .`).
  - repo: local
    hooks:
      - id: import-linter
        name: import-linter (layered architecture contract)
        entry: lint-imports
        language: system
        types: [python]
        pass_filenames: false
