    "8":  { success_1: 0.380, success_2: 0.130, no_effect: 0.190, drop_1: 0.180, drop_2: 0.120 }
    "9":  { success_1: 0.340, success_2: 0.120, no_effect: 0.200, drop_1: 0.210, drop_2: 0.130 }
    "10": { success_1: 0.310, success_2: 0.100, no_effect: 0.200, drop_1: 0.250, drop_2: 0.140 }
    "11": { success_1: 0.290, success_2: 0.080, no_effect: 0.200, drop_1: 0.270, drop_2: 0.160 }
    # very_hard (12..18)
    "12": { success_1: 0.220, success_2: 0.050, no_effect: 0.200, drop_1: 0.330, drop_2: 0.200 }
    "13": { success_1: 0.200, success_2: 0.045, no_effect: 0.200, drop_1: 0.335, drop_2: 0.220 }
    "14": { success_1: 0.180, success_2: 0.040, no_effect: 0.200, drop_1: 0.340, drop_2: 0.240 }
    "15": { success_1: 0.160, success_2: 0.035, no_effect: 0.200, drop_1: 0.345, drop_2: 0.260 }
    "16": { success_1: 0.150, success_2: 0.030, no_effect: 0.180, drop_1: 0.360, drop_2: 0.280 }
    "17": { success_1: 0.130, success_2: 0.025, no_effect: 0.180, drop_1: 0.365, drop_2: 0.300 }
    # extreme (18..25)
    "18": { success_1: 0.100, success_2: 0.020, no_effect: 0.180, drop_1: 0.380, drop_2: 0.320 }
    "19": { success_1: 0.090, success_2: 0.018, no_effect: 0.180, drop_1: 0.390, drop_2: 0.322 }
    "20": { success_1: 0.080, success_2: 0.015, no_effect: 0.180, drop_1: 0.395, drop_2: 0.330 }
