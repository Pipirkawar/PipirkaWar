# 🍆 Пипирик Варс — конфиг баланса
#
# Все «магические числа» игры. Редактируется через PR (Phase 0/1) или через
# админ-команду /balance_set / редактор веб-панели (Phase 2.5+ / 4.5).
#
# Источник правды для:
#   • §2.3 ГДД — таблица «Длина → Название» (display_names)
#   • §8.2 ГДД — три ветки исходов леса (forest.outcomes)
#   • §11 ГДД — кулдаун и прибавка предсказателя (oracle)
#   • §13.1 ГДД — реферальная схема (referral)
#   • §3.2 ГДД — формула цены толщины (thickness)
#   • §0.5 ГДД — DAU-Gate (dau_gate)
#
# ВАЛИДАЦИЯ: при загрузке (`BalanceLoader`) pydantic-схема проверяет:
#   • display_names покрывают всю шкалу [0, +∞) без дыр и пересечений;
#   • forest.outcomes имеют положительные веса и неотрицательные min ≤ max;
#   • referral.on_thickness_milestones отсортированы по `thickness` без дублей;
#   • oracle.bonus_min ≤ oracle.bonus_max и оба > 0.
#
# Любой невалидный YAML → отказ загрузки + алёрт в админ-чат.

version: 2

# -----------------------------------------------------------------------------
# §2.3 — таблица «Длина → Название».
#
# ⚠️ ЗАГЛУШКА. Геймдиз планирует полностью пересобрать таблицу (как сами
# названия, так и границы). До предоставления финального списка используется
# временная таблица из ГДД §2.3 v8.
#
# Правила:
#   • from <= length < to (полуоткрытый интервал)
#   • для последней записи to = null означает «до бесконечности»
#   • любое изменение — через PR или админ-команду; история — в `balance_versions`
# -----------------------------------------------------------------------------
display_names:
  - { from: 0,    to: 10,   name: "Пипирик" }
  - { from: 10,   to: 30,   name: "Писюнчик" }
  - { from: 30,   to: 60,   name: "Бананчик" }
  - { from: 60,   to: 100,  name: "Дубинка" }
  - { from: 100,  to: 200,  name: "Жезл" }
  - { from: 200,  to: 500,  name: "Батон по ГОСТу" }
  - { from: 500,  to: null, name: "Батон-переросток" }  # TODO(gd): полная пересборка

# -----------------------------------------------------------------------------
# §8.2 — лес: 3 ветки исходов. Все ветки положительные (лес безопасен).
# Веса нормализуются автоматически (не обязательно сумма 100).
# -----------------------------------------------------------------------------
forest:
  outcomes:
    - { name: "scarce",   weight: 50, min: 1,  max: 10 }
    - { name: "normal",   weight: 35, min: 5,  max: 15 }
    - { name: "abundant", weight: 15, min: 10, max: 20 }
  cooldown_min_minutes: 10
  cooldown_max_minutes: 20

# -----------------------------------------------------------------------------
# §11 — предсказатель. Кулдаун — по Москве (UTC+3), сброс в 00:00 MSK.
# -----------------------------------------------------------------------------
oracle:
  cooldown_tz: "Europe/Moscow"
  bonus_min: 1
  bonus_max: 20
  distribution: "uniform"   # позже можно weighted_buckets

# -----------------------------------------------------------------------------
# §13.1 — реферальная схема. Все начисления идут после регистрации новичка
# через `progression.add_length` с уникальным idempotency_key
# вида `referral:{milestone}:{referrer_id}:{referred_id}`.
# -----------------------------------------------------------------------------
referral:
  on_signup:
    newbie_bonus_cm: 5
    referrer_bonus_cm: 1
  on_thickness_milestones:
    - { thickness: 3, referrer_bonus_cm: 10 }
    - { thickness: 5, referrer_bonus_cm: 30 }

# -----------------------------------------------------------------------------
# §3.2 — толщина. Формула стоимости: cost(n) = base * n^exponent.
# При n=2 → 4000, n=10 → 100000, n=20 → 400000.
# -----------------------------------------------------------------------------
thickness:
  cost_base: 1000
  cost_exponent: 2
  unlock_levels:    # минимальный уровень для активностей (см. §3.3)
    forest: 1
    pvp_chat: 2
    mountains: 3
    raid_participate: 4
    caravan_raider: 5
    dungeon: 6
    caravan_create: 7
    raid_summon: 9

# -----------------------------------------------------------------------------
# §0.5 — DAU-Gate. Лимит можно менять «на горячую» через `/set_max_dau`.
# -----------------------------------------------------------------------------
dau_gate:
  max_dau: 200          # MVP, VPS 1 GB
  alert_threshold: 0.8  # уведомить админов при 80%

# -----------------------------------------------------------------------------
# §6.1 — глава клана дня.
#
# Бонус — uniform(bonus_min, bonus_max). Триггер ГИБРИДНЫЙ:
# 1) кнопка/команда `/clan_head` от любого члена клана (если на сегодня
#    ещё нет назначенного главы);
# 2) фоновый APScheduler-cron, который для каждого клана вычисляет
#    персональный offset 0..24h (детерминированно от clan_id + date).
# Что наступит первым — то и побеждает. Идемпотентность — по
# (clan_id, moscow_date), параллельные триггеры не дают двойного назначения.
# -----------------------------------------------------------------------------
daily_head:
  bonus_min: 1
  bonus_max: 20
  cooldown_tz: "Europe/Moscow"   # сутки сбрасываются в 00:00 МСК (как /oracle)
  schedule_mode: "hybrid"        # button | cron | hybrid
  cron_random_offset_hours: 24   # cron триггерится на random_offset(0..N) часов от 00:00 МСК per clan
  min_active_members: 5
  active_within_days: 7
  avoid_last_n: 3                # не выбирать одного и того же подряд

# -----------------------------------------------------------------------------
# Контент-полиси для каталога цитат главы клана (templates/clan_quotes_*.json).
# Применяется и при модерации ИИ-генерации в будущем.
# -----------------------------------------------------------------------------
content_policy:
  clan_quotes:
    mild_profanity: true     # Q9 v9: уместный мат разрешён
    politics: false
    ethnic_insults: false
    violence_advocacy: false
    advertising: false
    sexual_explicit: false
    # Цитаты с матом помечаются тегом `profanity` для опционального
    # фильтра «детский режим» в будущем.
