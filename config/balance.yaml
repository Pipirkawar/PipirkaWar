    "29": { success_1: 0.012, success_2: 0.000, no_effect: 0.170, drop_1: 0.418, drop_2: 0.400 }

# =============================================================================
# Free-to-play рулетка (ГДД §12.4, Спринт 3.5-A)
# =============================================================================
# 5 типов исхода (kind) разыгрываются weighted_choice-ом по `outcomes[].weight`.
# Сумма весов выходов == 1.0. Дубли по kind запрещены, все 5 значений обязаны
# присутствовать (даже crypto_lot — он перетекает на length при пустом пуле,
# см. picker `pick_roulette_outcome(crypto_pool_empty=...)`).
#
# Если выпал kind=length — затем weighted_choice по length_buckets, и наконец
# IRandom.randint(min_cm, max_cm) даёт конкретное число сантиметров.
roulette:
  free:
    cost_cm: 100              # стоимость одного спина (sink-механизм, ГДД §12.4.2)
    min_thickness_level: 2    # доступ с уровня 2 (use-case-валидация в 3.5-C)
    outcomes:
      - { kind: "length",         weight: 0.850 }
      - { kind: "item",           weight: 0.100 }
      - { kind: "scroll_regular", weight: 0.040 }
      - { kind: "scroll_blessed", weight: 0.005 }
      - { kind: "crypto_lot",     weight: 0.005 }
    length_buckets:
      - { name: "small",  min_cm: 10,  max_cm: 50,  weight: 0.700 }
      - { name: "medium", min_cm: 50,  max_cm: 150, weight: 0.250 }
      - { name: "good",   min_cm: 150, max_cm: 300, weight: 0.040 }
      - { name: "big",    min_cm: 300, max_cm: 500, weight: 0.010 }
  # ── Платная рулетка (Telegram Stars, ГДД §12.5.2, Спринт 4.1-A) ──
  # Структура полностью совпадает с `roulette.free`, но веса сдвинуты к
  # шмоту/скроллам/крипто-призу (меньше «голой длины»: 0.55 vs 0.85), а
  # стоимость взымается в Telegram Stars вместо см. По ГДД §12.5.1:
  # - 1 спин = `1 ⭐` (`cost_stars_single`);
  # - 10-pack = `9 ⭐` (`cost_stars_pack10`, ~10 % скидка vs 10 × 1).
  # `pack10_spins` — количество спинов в одной транзакции 10-pack-а.
  # `min_thickness_level=1` — доступ со старта, без длинного гейта.
  #
  # E[CM | spin, paid] ≈ 26.7 см (по ГДД §12.5.2):
  #   length-выход: 0.550 × E[length|bucket]
  #     small:  0.800 × E[10..50]   = 0.800 × 30   = 24.0
  #     medium: 0.170 × E[50..150]  = 0.170 × 100  = 17.0
  #     good:   0.025 × E[150..300] = 0.025 × 225  = 5.625
  #     big:    0.005 × E[300..500] = 0.005 × 400  = 2.0
  #   E[length|kind=length] = 24.0 + 17.0 + 5.625 + 2.0 ≈ 48.625 см
  #   E[CM | spin] = 0.550 × 48.625 ≈ 26.74 см
  # (10-pack за 9 ⭐ → ожидаемый возврат ≈ 9 × 26.7 ≈ 240 см см-эквивалента;
  # фактическая дисперсия — в integration-тесте 10000 спинов в 4.1-A).
  #
  # `crypto_lot` (вес 0.020) — заготовка под крипто-приз 4.1-C. До запуска
  # лот-генератора use-case всегда передаёт `crypto_pool_empty=True`, и
  # picker перетекает вес `crypto_lot` на `length` (как и у free-рулетки).
  paid:
    cost_stars_single: 1      # цена одиночного спина в ⭐ (ГДД §12.5.1)
    cost_stars_pack10: 9      # цена 10-pack-а в ⭐ (~10 % скидка vs 10 × 1)
    pack10_spins: 10          # спинов в одной транзакции 10-pack-а
    min_thickness_level: 1    # доступ со старта (ГДД §12.5.1)
    outcomes:
      - { kind: "length",         weight: 0.550 }
      - { kind: "item",           weight: 0.200 }
      - { kind: "scroll_regular", weight: 0.180 }
      - { kind: "scroll_blessed", weight: 0.050 }
      - { kind: "crypto_lot",     weight: 0.020 }
    length_buckets:
      - { name: "small",  min_cm: 10,  max_cm: 50,  weight: 0.800 }
      - { name: "medium", min_cm: 50,  max_cm: 150, weight: 0.170 }
      - { name: "good",   min_cm: 150, max_cm: 300, weight: 0.025 }
      - { name: "big",    min_cm: 300, max_cm: 500, weight: 0.005 }

# -----------------------------------------------------------------------------
# §12.6.3-§12.6.4 — крипто-лоты (Спринт 4.1-D).
#
# Сценарий «выигрыш → reserve → claim/expire»:
#   1. Игрок крутит платную/free-рулетку и выигрывает крипто-приз;
#      use-case `SpinPaidRoulette` / `SpinFreeRoulette` переводит лот
#      `ACTIVE → RESERVED` и пишет audit `PRIZE_LOT_RESERVED`.
#   2. У игрока есть `reserved_ttl_seconds` секунд, чтобы выполнить
#      `ClaimPrize(lot_id, recipient_address)` (Спринт 4.1-D, D.2).
#   3. Если за это время `ClaimPrize` не выполнен (бот недоступен,
#      кошелёк не привязан, TON-RPC лёг), cron `ExpireReservedPrizeLots`
#      (Спринт 4.1-D, D.9) возвращает лот в пул: `RESERVED → ACTIVE`
#      + `apply_increment(currency, amount)` обратно в `PrizePool`
#      + audit `PRIZE_LOT_REFUNDED` (audit-source добавлен в 4.1-C,
#      Alembic `0031`).
#
# `reserved_ttl_seconds` — стартовая гипотеза `172_800` (48 h),
# финал — на ревью геймдиза. Pydantic-границы: `[60, 30 d]` —
# меньше минуты резерв бессмысленен (auto-refund сразу после reserve),
# больше 30 дней лот зависает дольше, чем срок свежести P95-оценки
# комиссии (§12.6.4: «P95 за 7 дней»), и refund-математика ломается.
# -----------------------------------------------------------------------------
prize_lot:
  reserved_ttl_seconds: 172800   # 48 h; см. ГДД §12.6.3-§12.6.4

# -----------------------------------------------------------------------------
# §12.6.5 — лимит выплат на одного игрока (Спринт 4.1-E, шаг E.5).
#
# Защита крипто-пула от выкачивания одним игроком за короткий промежуток
# времени (массовая регистрация фейковых аккаунтов одного физлица + farm
# рулетки). Реализуется через rolling-window per currency:
#
#   sum( prize_lots.amount_native WHERE
#           winner_id = :player AND
#           currency  = :currency AND
#           status    = 'CLAIMED' AND
#           claimed_at >= now - window_days )
#     + amount_native_of_pending_claim
#     <= max_amount_native    ⇒ allow
#     >  max_amount_native    ⇒ over-limit → лот в очередь (E.11),
#                                cron вернёт в `ACTIVE`, когда самая
#                                старая выплата выпадет из окна.
#
# Currency, не упомянутая в `per_currency`, считается «unlimited» — для
# таких валют `IPayoutLimitChecker.check(...)` возвращает
# `PayoutLimitWithin(remaining_native = sys.maxsize)`. `STARS` запрещён
# валидатором — Stars-выплаты идут через TG-refund-канал и не подпадают
# под этот лимит (ГДД §12.6.5).
#
# Стартовые гипотезы (финал — на ревью геймдиза):
#   * `USDT_DECIMAL`: 50.00 USDT за 30 d  ⇒ `max_amount_native = 50_000_000`
#     (jetton-decimals=6, 1 USDT = 10**6 минор-юнит).
#   * `TON_NANO`:     10.00 TON  за 30 d  ⇒ `max_amount_native =
#     10_000_000_000` (1 TON = 10**9 nano-TON; ~50 USD-eq при 1 TON ≈ 5 USD).
#
# Pydantic-границы (см. `domain/balance/config.py::PayoutLimitConfig`):
#   * `window_days ∈ [1, 365]`;
#   * `max_amount_native >= 0` (`0` — kill-switch на одну валюту,
#     использовать для постоянного запрета лучше `/freeze_payouts`).
# -----------------------------------------------------------------------------
monetization:
  payout_limit:
    per_currency:
      - currency: "usdt_decimal"
        window_days: 30
        max_amount_native: 50000000      # 50.00 USDT (6 decimals)
      - currency: "ton_nano"
        window_days: 30
        max_amount_native: 10000000000   # 10.00 TON (9 decimals)
