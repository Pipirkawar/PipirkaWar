# 🍆 Пипирик Варс — конфиг баланса
#
# Все «магические числа» игры. Редактируется через PR (Phase 0/1) или через
# админ-команду /balance_set / редактор веб-панели (Phase 2.5+ / 4.5).
#
# Источник правды для:
#   • §2.3 ГДД — таблица «Длина → Название» (display_names)
#   • §8.2 ГДД — три ветки исходов леса (forest.outcomes) + дроп (forest.drop)
#   • §1.3.5 / §2.6 ГДД — каталог экипировки (items_catalog)
#   • §1.3.5 / §2.5 ГДД — каталог имён (names_catalog)
#   • §11 ГДД — кулдаун и прибавка предсказателя (oracle)
#   • §13.1 ГДД — реферальная схема (referral)
#   • §3.2 ГДД — формула цены толщины (thickness)
#   • §0.5 ГДД — DAU-Gate (dau_gate)
#   • §3.3.5 ГДД — анти-чит хардкап (anticheat)
#
# ВАЛИДАЦИЯ: при загрузке (`BalanceLoader`) pydantic-схема проверяет:
#   • display_names покрывают всю шкалу [0, +∞) без дыр и пересечений;
#   • forest.outcomes имеют положительные веса и неотрицательные min ≤ max;
#   • forest.drop.* проценты ∈ [0,100], rarity_weights — все 3 уровня > 0;
#   • items_catalog: ≥ 30 предметов, уникальные id, каждая редкость
#     (`common`/`rare`/`epic`) имеет ≥ 1 предмет, slot — один из 6 разрешённых;
#   • names_catalog: ≥ 30 имён, без пустых строк, без дублей;
#   • referral.on_thickness_milestones отсортированы по `thickness` без дублей;
#   • oracle.bonus_min ≤ oracle.bonus_max и оба > 0.
#
# Любой невалидный YAML → отказ загрузки + алёрт в админ-чат.

version: 3

# -----------------------------------------------------------------------------
# §2.3 — таблица «Длина → Название».
#
# ⚠️ ЗАГЛУШКА. Геймдиз планирует полностью пересобрать таблицу (как сами
# названия, так и границы). До предоставления финального списка используется
# временная таблица из ГДД §2.3 v8.
#
# Правила:
#   • from <= length < to (полуоткрытый интервал)
#   • для последней записи to = null означает «до бесконечности»
#   • любое изменение — через PR или админ-команду; история — в `balance_versions`
# -----------------------------------------------------------------------------
display_names:
  - { from: 0,    to: 10,   name: "Пипирик" }
  - { from: 10,   to: 30,   name: "Писюнчик" }
  - { from: 30,   to: 60,   name: "Бананчик" }
  - { from: 60,   to: 100,  name: "Дубинка" }
  - { from: 100,  to: 200,  name: "Жезл" }
  - { from: 200,  to: 500,  name: "Батон по ГОСТу" }
  - { from: 500,  to: null, name: "Батон-переросток" }  # TODO(gd): полная пересборка

# -----------------------------------------------------------------------------
# §8.2 — лес: 3 ветки исходов. Все ветки положительные (лес безопасен).
# Веса нормализуются автоматически (не обязательно сумма 100).
#
# `drop` (Спринт 1.3.A) — параметры дропа предмета или имени:
#   • probability_percent — шанс ЛЮБОГО дропа за поход (0–100, целые %).
#   • name_share_percent — внутри дропов: доля «имя» vs «предмет экипировки»
#     (`name as item type` — единственный путь получить имя, ГДД §2.5 / §1.3.5).
#   • rarity_weights — распределение редкости для предметов (имена редкость
#     не несут). 70/25/5 — тире-показатель из ГДД §1.3.5.
# Веса rarity_weights нормализуются автоматически.
# -----------------------------------------------------------------------------
forest:
  outcomes:
    - { name: "scarce",   weight: 50, min: 1,  max: 10 }
    - { name: "normal",   weight: 35, min: 5,  max: 15 }
    - { name: "abundant", weight: 15, min: 10, max: 20 }
  cooldown_min_minutes: 10
  cooldown_max_minutes: 20
  drop:
    probability_percent: 50
    name_share_percent: 5
    rarity_weights:
      common: 70
      rare: 25
      epic: 5
    # Спринт 3.1-C: per-location распределение слотов внутри дропа.
    # В лесу оружие НЕ дропает (ГДД §8 — оружие только в горах/данжоне),
    # поэтому `right_hand` / `left_hand` имеют вес 0. 6 слотов «обвеса»
    # распределены примерно равномерно с лёгким уклоном к hat/body/legs.
    slot_weights:
      hat: 20
      body: 20
      legs: 20
      boots: 15
      ring: 12
      chain: 13
      right_hand: 0
      left_hand: 0

# -----------------------------------------------------------------------------
# §8 — горы (Спринт 3.1.1). Уровень 3+, длина ≥ 20 см, кулдаун 20–40 мин.
# В отличие от леса исход ±: каждая ветка имеет `sign: "gain" | "loss"`,
# `min`/`max` — абсолютные значения. По ГДД §8 («± длина, 0–1 предмет»):
#   • Сум-веса gain ≈ сум-весам loss (~50/50 риск/награда), баланс может
#     наклонять в любую сторону без релиза кода.
#   • Ровный «±» по ГДД §8 — `gain.weight == loss.weight` суммарно;
#     но по §3.1.1 нужно проверять симметрию через 1000+ rolls тестов,
#     а не зашивать жёстко.
#   • `drop.max_drops: 1` — горы дают «0–1 предмет» (ГДД §8).
#   • Имена в горах НЕ дропятся (ГДД §2.5: имена — только лес).
# Веса дропа оружия (`right_hand`/`left_hand`) и категорий скроллов —
# отдельно в Спринтах 3.1-C / 3.1-D.
# -----------------------------------------------------------------------------
mountains:
  outcomes:
    # gain-ветки (положительный исход).
    - { name: "scarce_gain",   weight: 30, sign: "gain", min: 1,  max: 10 }
    - { name: "normal_gain",   weight: 20, sign: "gain", min: 5,  max: 18 }
    - { name: "abundant_gain", weight: 10, sign: "gain", min: 10, max: 30 }
    # loss-ветки (отрицательный исход — потеря длины).
    - { name: "scarce_loss",   weight: 25, sign: "loss", min: 1,  max: 8 }
    - { name: "heavy_loss",    weight: 15, sign: "loss", min: 5,  max: 18 }
  cooldown_min_minutes: 20
  cooldown_max_minutes: 40
  drop:
    probability_percent: 25
    max_drops: 1
    rarity_weights:
      common: 60
      rare: 30
      epic: 10
    # Спринт 3.1-C: горы дают и обвес, и оружие. Доля оружия выше, чем
    # в лесу (где она 0%), но ниже, чем в данжоне (см. ниже). Соотношение
    # right_hand/left_hand близко к 50/50 — обе руки равноценны для UX.
    slot_weights:
      hat: 12
      body: 12
      legs: 12
      boots: 12
      ring: 12
      chain: 12
      right_hand: 14
      left_hand: 14
    # Спринт 3.1-D: дроп скроллов заточки (ГДД §2.8.5).
    # Горы — «очень-очень малый шанс обычного скролла»; blessed горы НЕ дают
    # (это привилегия данжона, см. ниже). Шанс независимый от дропа предмета:
    # за один поход можно получить и предмет, и скролл (с малой вероятностью).
    # Категория (weapon/armor/jewelry) выбирается равновероятно.
    scroll_drops:
      regular_chance_percent: 3
      blessed_chance_percent: 0
      category_weights:
        weapon: 1
        armor: 1
        jewelry: 1

# -----------------------------------------------------------------------------
# §8 — данжон (Спринт 3.1.2). Уровень 6+, длина ≥ 20 см, кулдаун 40–60 мин.
# Структура идентична горам, но «больнее и щедрее»: больший разброс
# `min..max` для обоих знаков, выше шанс дропа (`probability_percent`),
# больше слотов дропа (`drop.max_drops: 3` — «0–3 предмета» по ГДД §8).
# -----------------------------------------------------------------------------
dungeon:
  outcomes:
    # gain-ветки.
    - { name: "scarce_gain",   weight: 25, sign: "gain", min: 5,  max: 25 }
    - { name: "normal_gain",   weight: 20, sign: "gain", min: 15, max: 45 }
    - { name: "abundant_gain", weight: 10, sign: "gain", min: 30, max: 80 }
    # loss-ветки.
    - { name: "scarce_loss",   weight: 25, sign: "loss", min: 3,  max: 18 }
    - { name: "heavy_loss",    weight: 20, sign: "loss", min: 10, max: 35 }
  cooldown_min_minutes: 40
  cooldown_max_minutes: 60
  drop:
    probability_percent: 50
    max_drops: 3
    rarity_weights:
      common: 50
      rare: 35
      epic: 15
    # Спринт 3.1-C: данжон даёт самую большую долю оружия — это
    # «крепость» PvE-контура (ГДД §8). Веса оружия выше, чем веса
    # любого отдельного слота обвеса.
    slot_weights:
      hat: 10
      body: 10
      legs: 10
      boots: 10
      ring: 10
      chain: 10
      right_hand: 20
      left_hand: 20
    # Спринт 3.1-D: дроп скроллов заточки (ГДД §2.8.5).
    # Данжон — единственная PvE-локация, дающая blessed-скроллы.
    # «Очень малый шанс обычного, очень-очень малый — blessed».
    # Числа целочисленные (ГДД §0: «никаких float-дрифтов в боевой логике»).
    scroll_drops:
      regular_chance_percent: 6
      blessed_chance_percent: 1
      category_weights:
        weapon: 1
        armor: 1
        jewelry: 1

# -----------------------------------------------------------------------------
# §11 — предсказатель. Кулдаун — по Москве (UTC+3), сброс в 00:00 MSK.
# -----------------------------------------------------------------------------
# -----------------------------------------------------------------------------
# §9 — караваны. Двухфазный лайфцикл: лобби 20 мин → бой 60 мин → исход.
# Декомпозиция Спринта 3.2:
#   • 3.2-A — каркас доменов + балансовый конфиг (этот блок).
#   • 3.2-B — use-cases CreateCaravan + JoinCaravanLobby + persistence.
#   • 3.2-C — боевая механика + награды.
#   • 3.2-D — bot-handlers + локали + APScheduler factory-wiring.
#
# Решения по умолчанию (можно крутить в YAML без релиза кода):
#   • leader: lvl 7+, длина ≥ 20 см, после взноса ≥ 20 см (ГДД §9.2).
#   • caravaneer: длина ≥ 20 см, после взноса ≥ 20 см. Без min_thickness.
#   • defender: длина ≥ 20 см. Без min_thickness.
#   • raider: lvl 5+, длина ≥ 20 см. Без contribution.
#   • lobby_minutes=20, battle_minutes=60, clan_cooldown_hours=12 (ГДД §9.3 / §9.5).
#   • Capacity: max_raiders ≤ 4 × caravaneers, max_defenders ≤ 2 × caravaneers (ГДД §9.5).
#   • Награды: leader×4 / caravaneer×3 / defender×1 / raider — отдельно
#     (-длина проигравшим). Множители ×4/×3/×1 — ГДД §9.6.
#   • +1 см «общей длины клана» получателю при успешном караване — ГДД §9.6.
# -----------------------------------------------------------------------------
caravans:
  min_thickness_level_leader: 7
  min_thickness_level_raider: 5
  min_length_cm: 20
  min_length_after_contribution_cm: 20
  lobby_minutes: 20
  battle_minutes: 60
  clan_cooldown_hours: 12
  max_raiders_per_caravaneer: 4
  max_defenders_per_caravaneer: 2
  base_reward_cm: 5
  reward_multipliers:
    leader: 4
    caravaneer: 3
    defender: 1
    raider: 0
    ataman_bonus_share: 4
  clan_bonus_cm: 1
  unblocked_strike_damage_cm: 1
  blocked_strike_damage_cm: 1

# -----------------------------------------------------------------------------
# §10 — рейд-боссы. Раундовая PvE-механика «один босс ↔ много рейдеров».
# Босс = случайный игрок из топ-30 по `length_cm` (решение cyan91 на старте
# 3.3-A: top-30 *игроков*, не кланов).
#
# Гейты входа (ГДД §10.1):
#   • саммонер: lvl 9+, длина ≥ 20 см. Кидает вызов командой `/boss`.
#   • рейдер: lvl 4+, длина ≥ 20 см. Вступает командой `/boss_join`.
#   • Глобальный кулдаун: 1 призыв в 4 часа на весь сервер (распределённый
#     lock через `boss_fights.started_at`-MAX). Решение cyan91 на старте 3.3-A.
#
# Лобби (ГДД §10.3): 20 минут после `/boss`-вызова. APScheduler-job
# `boss_lobby_close` переводит `LOBBY → IN_BATTLE` или `→ CANCELLED`,
# если никто не пришёл.
#
# Бой (ГДД §10.4): раунды длиной `round_min..round_max` секунд, до победы
# (босс < `victory_threshold_cm`) или поражения (все рейдеры выбыли).
# В каждом раунде босс — 3 атаки (бьёт всех), рейдеры — 3 блока (каждый
# один). Урон фиксированный — `base_damage_cm` (решение cyan91 на старте
# 3.3-A: фиксированное число, не процент и не от уровня).
#
# Награды (ГДД §10.5):
#   • Победа рейдеров: делят между собой длину босса + % от системы;
#     каждый выживший рейдер per-player ролит на скролл (regular: 5%,
#     blessed: 0.5% — решение cyan91 на старте 3.3-A, уточнится по
#     альфа-метрикам).
#   • Поражение рейдеров: босс «забирает» длину рейдеров + % от системы.
# -----------------------------------------------------------------------------
bosses:
  min_thickness_level_summoner: 9
  min_thickness_level_raider: 4
  min_length_cm: 20
  lobby_minutes: 20
  summon_cooldown_hours: 4
  top_n_pool: 30
  victory_threshold_cm: 10
  round_min_seconds: 20
  round_max_seconds: 60
  base_damage_cm: 5
  bot_play_chance: 1.0
  scroll_drop:
    regular: 0.05
    blessed: 0.005

oracle:
  cooldown_tz: "Europe/Moscow"
  bonus_min: 1
  bonus_max: 20
  distribution: "uniform"   # позже можно weighted_buckets
  # §11.1, Спринт 3.6-A — «бонус-за-племена».
  # +cm_per_tribe см за каждое активное племя (size >= min_tribe_size,
  # игрок — член), кап cap_cm. Аудит-источник `oracle_tribe_bonus`
  # (см. anticheat.tribe_bonus_sources, Спринт 3.6-A).
  tribe_bonus:
    enabled: true
    cm_per_tribe: 1
    cap_cm: 131
    min_tribe_size: 4

# -----------------------------------------------------------------------------
# §13.1 — реферальная схема. Все начисления идут после регистрации новичка
# через `progression.add_length` с уникальным idempotency_key
# вида `referral:{milestone}:{referrer_id}:{referred_id}`.
# -----------------------------------------------------------------------------
referral:
  on_signup:
    newbie_bonus_cm: 5
    referrer_bonus_cm: 1
  on_thickness_milestones:
    - { thickness: 3, referrer_bonus_cm: 10 }
    - { thickness: 5, referrer_bonus_cm: 30 }

# -----------------------------------------------------------------------------
# §3.2 — толщина. Формула стоимости: cost(n) = base * n^exponent.
# При n=2 → 4000, n=10 → 100000, n=20 → 400000.
# -----------------------------------------------------------------------------
thickness:
  cost_base: 1000
  cost_exponent: 2
  unlock_levels:    # минимальный уровень для активностей (см. §3.3)
    forest: 1
    pvp_chat: 2
    mountains: 3
    raid_participate: 4
    caravan_raider: 5
    dungeon: 6
    caravan_create: 7
    raid_summon: 9

# -----------------------------------------------------------------------------
# §0.5 — DAU-Gate. Лимит можно менять «на горячую» через `/set_max_dau`.
# -----------------------------------------------------------------------------
dau_gate:
  max_dau: 200          # MVP, VPS 1 GB
  alert_threshold: 0.8  # уведомить админов при 80%

# -----------------------------------------------------------------------------
# §6.1 — глава клана дня.
#
# Бонус — uniform(bonus_min, bonus_max). Триггер ГИБРИДНЫЙ:
# 1) кнопка/команда `/clan_head` от любого члена клана (если на сегодня
#    ещё нет назначенного главы);
# 2) фоновый APScheduler-cron, который для каждого клана вычисляет
#    персональный offset 0..24h (детерминированно от clan_id + date).
# Что наступит первым — то и побеждает. Идемпотентность — по
# (clan_id, moscow_date), параллельные триггеры не дают двойного назначения.
# -----------------------------------------------------------------------------
daily_head:
  bonus_min: 1
  bonus_max: 20
  cooldown_tz: "Europe/Moscow"   # сутки сбрасываются в 00:00 МСК (как /oracle)
  schedule_mode: "hybrid"        # button | cron | hybrid
  cron_random_offset_hours: 24   # cron триггерится на random_offset(0..N) часов от 00:00 МСК per clan
  min_active_members: 5
  active_within_days: 7
  avoid_last_n: 3                # не выбирать одного и того же подряд

# -----------------------------------------------------------------------------
# §3.3.5 — Анти-чит хардкап. Rolling-окна (24 ч / 7 дн) на organic-источники
# прироста длины. Превышение трип-вайр-лимита → soft-ban на N дней. Донат не
# попадает в агрегацию (платный канал, без ограничений).
#
# Источники, отсутствующие в обоих списках (`admin_refund`, `unknown`),
# вообще не учитываются: первый — служебная отрицательная дельта при
# сторно, второй — backfill для исторических записей до Спринта 1.6.A.
#
# Все имена источников должны соответствовать значениям `AuditSource`
# (см. `domain/shared/ports/audit.py`). Pydantic-схема падает с
# понятной ошибкой при опечатке.
# -----------------------------------------------------------------------------
anticheat:
  daily_cap_cm: 3000          # rolling 24 ч, см ГДД §3.3.1
  weekly_cap_cm: 14000        # rolling 7 дн, см ГДД §3.3.2
  soft_ban_duration_days: 14  # длительность бана при срабатывании trip-wire
  organic_sources:            # whitelist: эти источники попадают в агрегацию
    - forest
    - mountains
    - dungeon
    - oracle
    - referral_signup
    - referral_thickness
    - pvp_reward
    - caravan_reward
    - raid_reward
    - admin_grant
    - daily_head
  donate_sources:             # blacklist: эти источники игнорируются хардкапом
    - stars_payment
    - ton_payment
    - usdt_payment
  # Спринт 3.6-A (ГДД §11.1) — бонус-за-племена в /predict пишется в audit_log
  # с source=oracle_tribe_bonus, но НЕ учитывается в anti-cheat-окнах 24h/7d
  # (крупный клан не должен «съедать» хардкап своих участников). Disjoint
  # с organic_sources/donate_sources — проверяется pydantic-валидатором.
  tribe_bonus_sources:
    - oracle_tribe_bonus

# -----------------------------------------------------------------------------
# §7 — PvP-система. Сейчас только дуэли 1×1 (Спринт 2.1.A); масс-PvP
# (§7.2) добавится в Спринте 2.2 как `pvp.mass_pvp`.
#
# §7.1 / Спринт 2.1.1: бой 1×1 — 6 кнопок (3 атаки + 3 блока), 3 раунда,
# попадание не в блок → защитник теряет `floor(L * hit_pct / 100)` см
# (zero-sum: эта сумма прибавляется атакующему). Минимум по длине — 20 см
# (§7.1) и по толщине — уровень 2 (§3.2 / `thickness.unlock_levels.pvp_chat`).
# -----------------------------------------------------------------------------
pvp:
  duel_1v1:
    rounds: 3                # ГДД §7.1
    hit_pct: 10              # 10% длины защитника за попадание (10 см с 100 см)
    min_length_cm: 20        # ГДД §7.1
    min_thickness_level: 2   # ГДД §3.2 (дублирует thickness.unlock_levels.pvp_chat=2)
    # Спринт 2.1.F — глобальное лобби FIFO и auto-escalation chat→global.
    global_lobby_ttl_minutes: 10              # ГДД §7.1: вызов в global-лобби живёт 10 мин
    chat_to_global_promotion_minutes: 3       # ГДД §7.1: chat-вызов авто-промоутится в global через 3 мин
    # Спринт 2.1.G — AFK-таймер раунда (30..60 сек, ГДД §7.1).
    round_timer_seconds: 45                   # ГДД §7.1: ~45 сек на ход; затем AFK-фоллбэк
  # Спринт 2.2 — массовый PvP клан×клан (ГДД §7.2, см. development_plan.md §6).
  mass_duel:
    cooldown_hours: 6                # ГДД §7.2 / 2.2.2: 6 ч между клановыми вызовами
    min_length_cm: 20                # ГДД §7.2 / 2.2.2: участники с длиной ≥ 20 см
    min_thickness_level: 2           # ГДД §3.2: масс-PvP открывается на уровне 2 толщины
    min_clan_members: 1              # ГДД §7.2: бой возможен при ≥ 1 участнике на сторону
    move_timer_seconds: 180          # Спринт 2.2.F: 3 мин на ход всех участников; затем AFK-фоллбэк

